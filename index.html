<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BeiDu · home · staycation · live</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #f0f2f5; font-family: 'Inter', system-ui, sans-serif; }
    .bei-nav {
      background: #0a2540;
      color: white;
      padding: 12px 32px;
      display: flex;
      align-items: center;

      color: white;

      font-weight: 600;

      padding: 6px 16px;

      background: #1f4a7a;

    iframe {
      width: 100%;
      height: calc(100vh - 70px);
      border: none;
      background: white;
      display: block;
    }
    /* tiny fallback */
    .note { display: none; }
  </style>
</head>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BeiDu.com – social e‑commerce · regret nothing</title>
  <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.4/css/all.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --orange: #ff6a00;
      --orange-dark: #d95c00;
      --orange-light: #fff3e8;
      --blue: #0052ff;
      --blue-dark: #003fd1;
      --green: #00a854;
      --red: #e8232a;
      --text: #1a1a2e;
      --text-mid: #555;
      --text-light: #999;
      --bg: #f5f6fa;
      --white: #ffffff;
      --border: #e8e8ee;
      --radius-sm: 10px;
      --radius-md: 18px;
      --radius-lg: 28px;
      --radius-pill: 999px;
      --shadow-sm: 0 2px 10px rgba(0,0,0,0.04);
      --shadow-md: 0 6px 20px rgba(0,0,0,0.07);
      --shadow-lg: 0 18px 48px rgba(0,0,0,0.1);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; font-size: 14px; }
    .container { max-width: 1280px; margin: 0 auto; padding: 0 24px; }

    /* HEADER */
    .top-header { background: var(--white); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
    .header-row1, .header-row2 { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
    .header-row1 { padding: 12px 0; }
    .header-row2 { padding: 9px 0; border-top: 1px solid var(--border); }

    .logo-area { display: flex; align-items: center; gap: 9px; flex-shrink: 0; }
    .logo-icon { background: linear-gradient(135deg, var(--orange), #ff9040); width: 38px; height: 38px; border-radius: 11px; display: flex; align-items: center; justify-content: center; color: white; font-size: 20px; font-weight: 800; transform: rotate(-4deg); box-shadow: 0 4px 12px rgba(255,106,0,0.3); }
    .logo-text { font-size: 24px; font-weight: 800; color: var(--text); letter-spacing: -0.5px; }
    .logo-text span { color: var(--orange); font-weight: 300; }

    .search-wrapper { flex: 1; max-width: 580px; margin: 0 16px; }
    .search-bar-large { display: flex; align-items: center; background: var(--bg); border: 1.5px solid var(--border); border-radius: var(--radius-pill); padding: 0 16px; height: 46px; width: 100%; transition: border-color 0.2s; }
    .search-bar-large:focus-within { border-color: var(--orange); box-shadow: 0 0 0 3px rgba(255,106,0,0.07); }
    .search-bar-large i { color: var(--orange); font-size: 16px; }
    .search-bar-large input { border: none; background: transparent; outline: none; width: 100%; font-size: 14px; padding: 0 10px; font-family: inherit; color: var(--text); }
    .search-bar-large input::placeholder { color: var(--text-light); }
    .filter-dropdown { background: transparent; border: none; border-right: 1px solid var(--border); padding-right: 10px; margin-right: 10px; font-size: 13px; color: var(--text-mid); cursor: pointer; font-family: inherit; }

    .header-icons { display: flex; gap: 20px; font-size: 18px; color: var(--text-mid); align-items: center; flex-shrink: 0; }
    .header-icons i { cursor: pointer; transition: color 0.2s; }
    .header-icons i:hover { color: var(--orange); }
    .cart-badge { position: relative; }
    .cart-badge::after { content: '0'; position: absolute; top: -7px; right: -9px; background: var(--orange); color: white; font-size: 10px; font-weight: 700; width: 17px; height: 17px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    .flag-trigger { display: flex; align-items: center; gap: 5px; cursor: pointer; font-size: 14px; font-weight: 500; }

    .all-categories { background: var(--orange-light); padding: 7px 16px; border-radius: var(--radius-pill); display: flex; align-items: center; gap: 8px; font-weight: 600; font-size: 13px; cursor: pointer; color: var(--orange); transition: background 0.2s; }
    .all-categories:hover { background: #ffe0c5; }
    .all-categories i { font-size: 14px; }

    .nav-links-row2 { display: flex; gap: 28px; font-weight: 600; align-items: center; text-transform: uppercase; font-size: 13px; letter-spacing: 0.3px; }
    .nav-links-row2 a { text-decoration: none; color: var(--text-mid); transition: color 0.2s; }
    .nav-links-row2 a:hover { color: var(--orange); }
    /* removed .live-link and .staycation-link styles because those elements are gone */
    .live-dot { display: inline-block; width: 7px; height: 7px; background: #e1251b; border-radius: 50%; animation: pd 1.5s infinite; }
    @keyframes pd { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(1.25)} }

    .new-badge { background: var(--orange); color: white; font-size: 9px; font-weight: 700; padding: 2px 7px; border-radius: var(--radius-pill); text-transform: uppercase; letter-spacing: 0.5px; }

    /* MEGA MENU */
    .mega-menu-item { position: relative; }
    .mega-menu { position: absolute; top: 44px; left: 0; width: 860px; background: var(--white); border-radius: var(--radius-lg); box-shadow: var(--shadow-lg); padding: 28px; display: none; grid-template-columns: repeat(4, 1fr); gap: 20px; z-index: 1000; border: 1px solid var(--border); }
    .mega-menu-item:hover .mega-menu { display: grid; }
    .mega-col h4 { font-size: 12px; font-weight: 700; margin-bottom: 13px; color: var(--orange); border-bottom: 2px solid var(--orange-light); padding-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
    .mega-col ul { list-style: none; }
    .mega-col li { margin-bottom: 10px; font-size: 13px; display: flex; align-items: center; gap: 9px; color: var(--text-mid); }
    .mega-col i { width: 20px; color: var(--blue); font-size: 12px; }
    .mega-col a { text-decoration: none; color: var(--text-mid); transition: color 0.2s; }
    .mega-col a:hover { color: var(--orange); }

    /* HERO */
    .hero { background: linear-gradient(145deg, #fffaf5, #fff3e6); border-radius: var(--radius-lg); margin: 28px 0; padding: 36px 40px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; box-shadow: 0 4px 20px rgba(255,106,0,0.07); gap: 20px; border: 1px solid #ffe0c5; }
    .hero-ad-card { background: linear-gradient(135deg, #0052ff, #4d89ff); color: white; border-radius: var(--radius-md); padding: 20px 18px; min-width: 175px; text-align: center; box-shadow: 0 12px 28px rgba(0,82,255,0.22); }
    .hero-ad-card i { font-size: 30px; margin-bottom: 8px; display: block; }
    .hero-ad-card .ad-title { font-weight: 700; font-size: 17px; margin-bottom: 3px; }
    .hero-ad-card .ad-sub { font-size: 12px; opacity: 0.88; }
    .hero h1 { font-size: 38px; font-weight: 800; line-height: 1.2; color: var(--text); flex: 1; }
    .hero h1 span { color: var(--orange); display: block; font-size: 21px; font-weight: 400; margin-top: 8px; opacity: 0.8; }
    .hero .cta-btn { background: linear-gradient(135deg, var(--blue), #3a6eff); color: white; padding: 14px 38px; border-radius: var(--radius-pill); font-size: 17px; font-weight: 600; border: none; cursor: pointer; box-shadow: 0 8px 20px rgba(0,82,255,0.22); transition: all 0.2s; font-family: inherit; }
    .hero .cta-btn:hover { background: var(--blue-dark); transform: translateY(-1px); }

    /* AD BANNER */
    .ad-banner { width: 100%; background: #000; margin: 24px 0; border-radius: var(--radius-lg); overflow: hidden; position: relative; box-shadow: var(--shadow-md); }
    .banner-slides { display: flex; transition: transform 0.5s ease; }
    .banner-slide { min-width: 100%; height: 185px; background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; font-size: 26px; font-weight: 700; color: white; text-shadow: 0 3px 10px rgba(0,0,0,0.4); letter-spacing: -0.3px; }
    .banner-controls { position: absolute; bottom: 18px; right: 24px; display: flex; gap: 8px; }
    .banner-dots { position: absolute; bottom: 18px; left: 24px; display: flex; gap: 10px; }
    .dot { width: 10px; height: 10px; background: rgba(255,255,255,0.4); border-radius: 50%; cursor: pointer; transition: all 0.2s; }
    .dot.active { background: white; transform: scale(1.3); }
    .arrow { background: rgba(0,0,0,0.4); color: white; width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 15px; transition: background 0.2s; backdrop-filter: blur(4px); }
    .arrow:hover { background: rgba(0,0,0,0.65); }

    /* PILLARS */
    .pillars { display: grid; grid-template-columns: repeat(4, 1fr); gap: 18px; margin: 40px 0; }
    .pillar-card { background: var(--white); border-radius: var(--radius-lg); padding: 26px 20px 22px; border: 1px solid var(--border); box-shadow: var(--shadow-sm); transition: all 0.2s; }
    .pillar-card:hover { box-shadow: 0 16px 36px rgba(255,106,0,0.09); border-color: rgba(255,106,0,0.18); transform: translateY(-2px); }
    .pillar-icon { font-size: 26px; background: var(--orange-light); width: 56px; height: 56px; border-radius: 16px; display: flex; align-items: center; justify-content: center; margin-bottom: 16px; color: var(--orange); }
    .pillar-card h3 { font-size: 21px; font-weight: 800; margin-bottom: 13px; line-height: 1.25; }
    .pillar-sub { list-style: none; }
    .pillar-sub li { margin-bottom: 10px; font-size: 13px; color: var(--text-mid); display: flex; align-items: center; gap: 9px; }
    .pillar-sub i { color: var(--green); width: 18px; font-size: 12px; }
    .pillar-sub .free-gift-tag { background: #ffefd0; color: #a05800; font-size: 10px; padding: 2px 7px; border-radius: var(--radius-pill); margin-left: 5px; font-weight: 600; }

    /* WEEKLY BAR */
    .weekly-bar { background: var(--white); border-radius: var(--radius-pill); padding: 18px 28px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; box-shadow: var(--shadow-sm); margin: 32px 0 14px; border: 1px solid var(--border); gap: 14px; }
    .weekly-title { font-weight: 700; font-size: 17px; color: var(--text); }
    .weekly-title i { color: var(--orange); margin-right: 7px; }
    .days { display: flex; gap: 18px; font-weight: 600; }
    .day { text-align: center; font-size: 12px; color: var(--text-light); }
    .day .badge { background: #f0f0f5; border-radius: var(--radius-pill); padding: 3px 10px; margin-top: 4px; font-size: 10px; color: var(--text-mid); font-weight: 500; }
    .day.highlight .badge { background: var(--orange); color: white; }
    .day.highlight { color: var(--orange); font-weight: 700; }

    /* ANNOUNCEMENTS */
    .announcements-section { margin: 32px 0; }
    .announcement-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-top: 16px; }
    .announcement-card { background: var(--white); border-radius: var(--radius-lg); padding: 22px; border: 1px solid var(--border); box-shadow: var(--shadow-sm); transition: all 0.2s; display: flex; flex-direction: column; align-items: center; text-align: center; }
    .announcement-card:hover { box-shadow: 0 14px 30px rgba(255,106,0,0.08); border-color: rgba(255,106,0,0.15); transform: translateY(-2px); }
    .announcement-card i { font-size: 28px; color: var(--orange); margin-bottom: 13px; background: var(--orange-light); width: 62px; height: 62px; display: flex; align-items: center; justify-content: center; border-radius: 50%; }
    .announcement-card h4 { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
    .announcement-card p { color: var(--text-light); font-size: 13px; line-height: 1.6; }

    /* SECTION TITLES */
    .section-title { font-size: 21px; font-weight: 700; margin: 32px 0 14px; display: flex; align-items: center; gap: 10px; }
    .section-title i { color: var(--orange); font-size: 22px; }

    /* PRODUCT GRID & CARDS */
    .product-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; }
    .product-card { background: var(--white); border-radius: var(--radius-md); padding: 14px; border: 1px solid var(--border); box-shadow: var(--shadow-sm); transition: all 0.18s; position: relative; display: flex; flex-direction: column; }
    .product-card:hover { box-shadow: 0 10px 26px rgba(0,0,0,0.08); transform: translateY(-2px); border-color: #ddd; }
    .product-img { background: var(--bg); height: 118px; border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; font-size: 34px; color: #b8c0cc; margin-bottom: 11px; }
    .product-original { text-decoration: line-through; font-size: 12px; color: #bbb; }
    .product-price { font-size: 19px; font-weight: 700; color: var(--red); }
    .product-price small { font-size: 12px; font-weight: 400; color: var(--text-mid); }
    .badge-discount { background: var(--red); color: white; font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: var(--radius-pill); display: inline-block; margin: 5px 0; }
    .gift-icon { background: var(--green); color: white; border-radius: var(--radius-pill); padding: 2px 8px; font-size: 10px; display: inline-flex; align-items: center; gap: 3px; margin-left: 5px; font-weight: 500; }
    .treasure-tag { background: #ffd700; color: #7a4f00; font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: var(--radius-pill); }
    .rating { color: #ffb800; font-size: 12px; margin: 4px 0; }
    .rating span { color: var(--text-light); font-size: 11px; margin-left: 3px; }
    .stock-status { font-size: 11px; color: var(--green); font-weight: 600; }
    .shipping-info { font-size: 11px; color: var(--text-light); margin-top: 2px; }
    .card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; }
    .cta-small { background: linear-gradient(135deg, var(--blue), #3a6eff); color: white; border: none; border-radius: var(--radius-pill); padding: 6px 14px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit; transition: all 0.2s; }
    .cta-small:hover { background: var(--blue-dark); }
    .chat-icon { color: var(--orange); font-size: 17px; cursor: pointer; transition: transform 0.2s; }
    .chat-icon:hover { transform: scale(1.15); }
    .badge-row { display: flex; flex-wrap: wrap; gap: 4px; margin: 5px 0; }
    .badge { background: #f2f4f8; padding: 2px 7px; border-radius: var(--radius-pill); font-size: 10px; font-weight: 600; color: var(--text-mid); }
    .badge.flash { background: linear-gradient(135deg, var(--orange), #ff9640); color: white; animation: pbadge 1.2s infinite; }
    @keyframes pbadge { 0%,100%{opacity:1} 50%{opacity:.75} }
    .badge.limited { background: var(--red); color: white; }

    /* PROMISE BOX */
    .promise-box { background: linear-gradient(135deg, #1a2240, #1e2a41); color: white; border-radius: var(--radius-pill); padding: 26px 40px; margin: 40px 0; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px; }
    .promise-text h3 { font-size: 24px; font-weight: 700; margin-bottom: 7px; }
    .promise-text p { opacity: 0.85; font-size: 14px; }
    .promise-badge { background: var(--orange); padding: 13px 24px; border-radius: 60px; font-weight: 700; font-size: 16px; box-shadow: 0 6px 0 var(--orange-dark); }

    /* FOOTER */
    footer { background: var(--white); border-radius: var(--radius-lg) var(--radius-lg) 0 0; padding: 44px 0 28px; margin-top: 52px; border-top: 1px solid var(--border); }
    .footer-grid { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 1.5fr; gap: 28px; margin-bottom: 36px; }
    .footer-col p { color: var(--text-light); margin: 14px 0; font-size: 13px; line-height: 1.7; }
    .footer-logo { font-size: 24px; font-weight: 800; color: var(--orange); }
    .footer-links { list-style: none; }
    .footer-links li { margin-bottom: 10px; }
    .footer-links a { text-decoration: none; color: var(--text-mid); font-size: 13px; transition: color 0.2s; }
    .footer-links a:hover { color: var(--orange); }
    .footer-col h4 { font-size: 12px; font-weight: 700; letter-spacing: 0.5px; margin-bottom: 14px; color: var(--text); text-transform: uppercase; }
    .newsletter input { padding: 10px 16px; border-radius: var(--radius-pill); border: 1.5px solid var(--border); width: 100%; margin: 10px 0; font-family: inherit; font-size: 13px; color: var(--text); outline: none; transition: border-color 0.2s; }
    .newsletter input:focus { border-color: var(--orange); }
    .subscribe-btn { background: linear-gradient(135deg, var(--blue), #3a6eff); color: white; border: none; padding: 10px 22px; border-radius: var(--radius-pill); font-weight: 600; cursor: pointer; font-family: inherit; transition: all 0.2s; }
    .subscribe-btn:hover { background: var(--blue-dark); }
    .app-icons i { font-size: 26px; margin-right: 14px; color: var(--text-mid); }
    .social i { font-size: 21px; margin-right: 16px; color: var(--text-light); transition: color 0.2s; }
    .social i:hover { color: var(--orange); }
    .copyright { text-align: center; border-top: 1px solid var(--border); padding-top: 22px; color: var(--text-light); font-size: 12px; }
    hr { opacity: 0.15; }

    /* FLOATING TOOLBAR */
    .floating-toolbar { position: fixed; right: 18px; top: 50%; transform: translateY(-50%); background: var(--white); border-radius: 30px; box-shadow: var(--shadow-lg); display: flex; flex-direction: column; padding: 10px 0; width: 50px; align-items: center; z-index: 99; border: 1px solid var(--border); }
    .floating-toolbar i { font-size: 17px; color: var(--text-mid); margin: 10px 0; cursor: pointer; transition: color 0.2s; }
    .floating-toolbar i:hover { color: var(--orange); }
    .back-to-top { margin-top: 8px; border-top: 1px solid var(--border); padding-top: 10px; width: 100%; text-align: center; }

    /* DRAWER */
    .drawer-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.35); z-index: 200; opacity: 0; visibility: hidden; transition: 0.3s; backdrop-filter: blur(2px); }
    .drawer-overlay.active { opacity: 1; visibility: visible; }
    .account-drawer { position: fixed; top: 0; right: -340px; width: 310px; height: 100%; background: var(--white); box-shadow: -6px 0 36px rgba(0,0,0,0.1); z-index: 201; transition: right 0.3s ease; padding: 28px 20px; overflow-y: auto; }
    .account-drawer.open { right: 0; }
    .drawer-header { display: flex; align-items: center; gap: 13px; margin-bottom: 24px; }
    .drawer-header i { font-size: 26px; color: var(--orange); }
    .drawer-header .sign-in-btn { background: var(--orange); color: white; border: none; padding: 8px 18px; border-radius: var(--radius-pill); font-weight: 600; cursor: pointer; font-family: inherit; font-size: 13px; transition: background 0.2s; }
    .drawer-header .sign-in-btn:hover { background: var(--orange-dark); }
    .drawer-header .register-link { color: var(--text-light); font-size: 13px; cursor: pointer; }
    .drawer-menu { list-style: none; }
    .drawer-menu li { display: flex; align-items: center; gap: 13px; padding: 12px 0; border-bottom: 1px solid var(--border); color: var(--text-mid); cursor: pointer; font-size: 13px; transition: color 0.2s; }
    .drawer-menu li i { width: 20px; color: var(--orange); font-size: 13px; }
    .drawer-menu li:hover { color: var(--orange); }

    /* MODAL */
    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 300; opacity: 0; visibility: hidden; transition: 0.3s; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(3px); }
    .modal-overlay.active { opacity: 1; visibility: visible; }
    .region-modal { background: var(--white); border-radius: var(--radius-lg); padding: 36px; width: 90%; max-width: 460px; box-shadow: 0 32px 72px rgba(0,0,0,0.16); }
    .region-modal h3 { font-size: 21px; font-weight: 700; margin-bottom: 22px; }
    .region-row { margin-bottom: 16px; }
    .region-row label { font-weight: 600; display: block; margin-bottom: 6px; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-mid); }

  <script>
    (function() {
      const slides = document.querySelectorAll('.banner-slide');
      const dotsContainer = document.getElementById('bannerDots');
      const prev = document.getElementById('prevArrow');
      const next = document.getElementById('nextArrow');
      const slidesArray = Array.from(slides);
      let currentIndex = 0, timer;
      const durations = [5000, 3000, 2000, 3000];

      slidesArray.forEach((_, i) => {
        const dot = document.createElement('span');
        dot.classList.add('dot');
        dot.addEventListener('click', () => goToSlide(i));
        dotsContainer.appendChild(dot);
      });
      const dots = document.querySelectorAll('.dot');

      function updateDots() { dots.forEach((d, i) => d.classList.toggle('active', i === currentIndex)); }

      function goToSlide(index) {
        if (index < 0) index = slidesArray.length - 1;
        if (index >= slidesArray.length) index = 0;
        currentIndex = index;
        document.getElementById('bannerSlides').style.transform = `translateX(-${currentIndex * 100}%)`;
        updateDots();
        resetTimer();
      }

      function resetTimer() {
        if (timer) clearTimeout(timer);
        timer = setTimeout(() => goToSlide(currentIndex + 1), durations[currentIndex % durations.length]);
      }

      prev.addEventListener('click', () => goToSlide(currentIndex - 1));
      next.addEventListener('click', () => goToSlide(currentIndex + 1));

      const banner = document.querySelector('.ad-banner');
      banner.addEventListener('mouseenter', () => clearTimeout(timer));
      banner.addEventListener('mouseleave', resetTimer);

      goToSlide(0);
    })();
  </script>

function buildCard(card, idx) {
  const stars = '★'.repeat(Math.floor(card.rating)) + (card.rating % 1 >= 0.5 ? '☆' : '');
  return `
    <div class="prop-card" onclick="openModal(${idx},'${card.tier}')">
      <div class="card-img">
        <div class="img-bg" style="background:${card.bg}">${card.emoji}</div>
        <button class="wishlist-btn" onclick="event.stopPropagation();toggleWishlist(this)">♡</button>
        <div class="tier-ribbon ${card.tier}">${card.tier==='gold'?'✦ GOLD':card.tier==='bronze'?'◆ BRONZE':'● SILVER'}</div>
        ${card.discount?`<div class="discount-badge">🔥 ${card.discount}</div>`:''}
      </div>
      <div class="card-body">
        <div class="price-line">
          <div class="price">from ${card.price}<span>/night</span></div>
          <span class="price-type ${card.priceType}">${card.priceType==='negotiable'?'💰 Negotiable':'✓ Fixed'}</span>
        </div>

function renderGrids() {
  document.getElementById('gold-grid').innerHTML = goldCards.map((c,i)=>buildCard(c,i)).join('');
  document.getElementById('bronze-grid').innerHTML = bronzeCards.map((c,i)=>buildCard(c,i)).join('');
  document.getElementById('silver-grid').innerHTML = silverCards.map((c,i)=>buildCard(c,i)).join('');
}

function openModal(idx, tier) {
  const cards = tier==='gold'?goldCards:tier==='bronze'?bronzeCards:silverCards;

  const stars = '★'.repeat(Math.floor(c.rating))+(c.rating%1>=0.5?'☆':'');
  const featHtml = c.features.map(f=>`<span style="display:inline-block;background:#f0f0ff;color:#4c1d95;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;margin:2px;">${f}</span>`).join('');
  const amenHtml = c.amenities.map(a=>`<div class="amenity">✓ ${a}</div>`).join('');
  const base = parseInt(c.price.replace(/[^0-9]/g,''));
  const total7 = base*7;
  const inst = Math.round(total7/4);

  const bookedDays=[3,4,13,14,15,27,28], promoDays=[10,11,12,20,21,22,23];
  let calHtml='<div class="calendar-grid">';
  ['Su','Mo','Tu','We','Th','Fr','Sa'].forEach(d=>{calHtml+=`<div class="cal-header">${d}</div>`;});
  for(let e=0;e<6;e++) calHtml+=`<div class="cal-day empty"></div>`;
  for(let d=1;d<=31;d++){
    let cls=bookedDays.includes(d)?'booked':promoDays.includes(d)?'promo':'available';
    calHtml+=`<div class="cal-day ${cls}" onclick="selectDay(this)">${d}</div>`;
  }
  calHtml+='</div><div style="display:flex;gap:12px;flex-wrap:wrap;font-size:11px;color:#6b7280;margin-bottom:16px;"><span>🟢 Available</span><span>🔴 Booked</span><span>🟣 Promo</span></div>';

  const chatHtml = c.chat==='unlocked' ? `
    <div class="chat-messages" id="chat-msgs">
      <div class="chat-bubble host">Hello! Welcome to ${c.name}. Happy to answer any questions 😊</div>
      <div class="chat-bubble host">Ask about availability, amenities, or special requests!</div>
    </div>
    <div class="chat-input-row">
      <input class="chat-input" id="chat-input" placeholder="Type a message…" onkeydown="if(event.key==='Enter')sendChat()">
      <button class="chat-send" onclick="sendChat()">➤</button>
    </div>` : `
    <div class="chat-messages"><div class="chat-bubble host" style="background:#fef3c7;color:#92400e;">Please request chat access to message this host directly.</div></div>
    <button style="width:100%;background:linear-gradient(90deg,#f59e0b,#d97706);border:none;color:white;padding:10px;border-radius:10px;font-family:DM Sans,sans-serif;font-weight:600;cursor:pointer;">🔒 Request Chat Access</button>`;

  document.getElementById('modal-inner').innerHTML = `
    <div class="modal-gallery">
      <div class="gallery-main"><div class="gimg" style="background:${c.bg};font-size:100px;">${c.emoji}</div></div>
      <div class="gallery-side">
        ${c.modalEmojis.slice(1).map(e=>`<div class="gimg" style="background:${c.bg}bb;">${e}</div>`).join('')}
      </div>
    </div>
    <div class="modal-body">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px;margin-bottom:14px;">
        <div><div class="modal-title">${c.name}</div><div class="modal-sub">${c.type} · ${c.guests} guests · ${c.beds} bedroom${c.beds>1?'s':''} · 📍 ${c.location}</div></div>
        <button id="wl-btn" onclick="toggleWishlistModal(this)" style="background:white;border:2px solid #ef4444;color:#ef4444;padding:9px 18px;border-radius:30px;font-weight:700;cursor:pointer;font-family:DM Sans,sans-serif;font-size:13px;">♡ Wishlist</button>
      </div>
      <div style="margin-bottom:14px;">${featHtml}</div>
      <div class="modal-ratings">
        <div class="modal-rating-item">⭐ <strong>${stars} ${c.rating}/5</strong> (${c.reviews} reviews)</div>
        <div class="modal-rating-item">👤 Host: <strong>${c.hostRating}/10</strong></div>
        <div class="modal-rating-item">${c.chat==='unlocked'?'<span style="color:#16a34a">💬 BeiDuChat UNLOCKED – Message instantly</span>':'<span style="color:#d97706">🔒 BeiDuChat LOCKED – Request approval</span>'}</div>
      </div>
      <div class="modal-price-row">
        <div><div style="font-size:11px;opacity:0.7;margin-bottom:4px;">Base Rate</div><div class="modal-price-big">from ${c.price}<span>/night</span></div><div style="font-size:11px;margin-top:4px;opacity:0.7;">Type: ${c.priceType==='negotiable'?'💰 Negotiable':'✓ Fixed'}</div></div>
        <div style="text-align:right;"><div style="font-size:11px;opacity:0.7;">Check-in / Check-out</div><div style="font-weight:700;margin-top:4px;">📅 ${c.checkin} → ${c.checkout}</div></div>
      </div>
      <div class="modal-section-title">🎁 Promotions & Hidden Gifts</div>
      <div class="modal-promos">
        <div class="modal-promo-item"><div class="modal-promo-icon">🔥</div><div><strong>Current Offer:</strong> ${c.promo}</div></div>
        <div class="modal-promo-item"><div class="modal-promo-icon">💳</div><div><strong>Lipa Ndogo:</strong> Book now, pay in installments. Full payment required before check-in/occupancy.</div></div>
        <div class="modal-promo-item"><div class="modal-promo-icon">🎁</div><div><strong>Hidden Gift on Arrival:</strong> ${c.gift}</div></div>
      </div>
      <div class="lipa-calc">
        <div class="lipa-title">💳 Lipa Ndogo Calculator (7 nights @ ${c.price}/night)</div>
        <div class="lipa-row"><span>Total (7 nights)</span><span>${c.price.split('$')[0]}$${total7}</span></div>
        <div class="lipa-row"><span>Installment 1 (on booking)</span><span>~${c.price.split('$')[0]}$${inst}</span></div>
        <div class="lipa-row"><span>Installment 2 (2 weeks later)</span><span>~${c.price.split('$')[0]}$${inst}</span></div>
        <div class="lipa-row"><span>Installment 3 (1 month later)</span><span>~${c.price.split('$')[0]}$${inst}</span></div>
        <div class="lipa-row"><span>Final payment (before check-in)</span><span>~${c.price.split('$')[0]}$${total7 - inst*3}</span></div>
      </div>
      <div class="modal-section-title">📅 Availability – March 2026</div>
      ${calHtml}

      <div class="amenities-grid">${amenHtml}</div>

        <button class="modal-btn secondary">↗ Share</button>
      </div>
    </div>`;

  document.getElementById('modal-overlay').classList.add('open');

function closeModal(e, force) {
  if(force || (e && e.target === document.getElementById('modal-overlay'))) {
    document.getElementById('modal-overlay').classList.remove('open');
    document.body.style.overflow='';
  }
}

function toggleWishlist(btn) {
  btn.classList.toggle('liked');
  btn.textContent = btn.classList.contains('liked') ? '❤️' : '♡';
}

function toggleWishlistModal(btn) {
  const added = btn.dataset.added==='true';
  btn.dataset.added = !added;
  btn.textContent = !added ? '❤️ Saved' : '♡ Wishlist';
  btn.style.background = !added ? '#ef4444' : 'white';
  btn.style.color = !added ? 'white' : '#ef4444';
}

function selectDay(el) {
  document.querySelectorAll('.cal-day.selected').forEach(d=>d.classList.remove('selected'));
  el.classList.add('selected');
}

function sendChat() {
  const input = document.getElementById('chat-input');
  const msgs = document.getElementById('chat-msgs');
  if(!input||!input.value.trim()) return;
  const b = document.createElement('div');
  b.className = 'chat-bubble guest';
  b.textContent = input.value;
  msgs.appendChild(b);
  input.value='';
  msgs.scrollTop=msgs.scrollHeight;
  setTimeout(()=>{
    const r=document.createElement('div');
    r.className='chat-bubble host';
    r.textContent='Thank you! I\'ll get back to you shortly 😊';
    msgs.appendChild(r);
    msgs.scrollTop=msgs.scrollHeight;
  },1200);
}

document.querySelectorAll('.feat-chip').forEach(chip=>{
  chip.addEventListener('click',()=>{
    document.querySelectorAll('.feat-chip').forEach(c=>c.classList.remove('active'));
    chip.classList.add('active');
  });
});

renderGrids();
</script>
</body>

  <script>
    const iframe = document.getElementById('mainFrame');
    const homeTemplate = document.getElementById('templateHome');
    const stayTemplate = document.getElementById('templateStaycation');
    const liveTemplate = document.getElementById('templateLive');

    function setIframeContent(template) {
      // prepend doctype to the template's innerHTML (which contains the full <html>)
      const fullHtml = '<!DOCTYPE html>\n' + template.innerHTML;
      iframe.srcdoc = fullHtml;
    }

    // initial load: home
    setIframeContent(homeTemplate);

    document.getElementById('btnHome').addEventListener('click', (e) => {
      e.preventDefault();
      setIframeContent(homeTemplate);
    });
    document.getElementById('btnStay').addEventListener('click', (e) => {
      e.preventDefault();
      setIframeContent(stayTemplate);
    });
    document.getElementById('btnLive').addEventListener('click', (e) => {
      e.preventDefault();
      setIframeContent(liveTemplate);
    });
